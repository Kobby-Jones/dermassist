version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: dermassist
      POSTGRES_PASSWORD: dermassistpass
      POSTGRES_DB: dermassist_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: .
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://dermassist:dermassistpass@db:5432/dermassist_db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-changeme-generate-with-openssl-rand-hex-32}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 60
      APP_ENV: development
      ALLOWED_ORIGINS: "*"
    ports:
      - "8000:8000"
    volumes:
      - .:/app   # hot-reload during development

volumes:
  pgdata:
